function totalProfit(){return S.sales.reduce((a,s)=>a+(s.revenue-s.cost),0);}

            ${['Small','Medium','Large','X-Large'].map(sz=>`<option value="${sz}" ${s.size===sz?'selected':''} style="background:#222">${sz}</option>`).join('')}
          </select></div>
        <div><label style="font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:5px;letter-spacing:0.3px">CHANNEL *</label>
          <select onchange="S.newSale.channel=this.value;render()" style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;color:#fff;font-size:13px;outline:none">
            ${['Walk-in','Phone','Uber Eats','DoorDash'].map(c=>`<option value="${c}" ${s.channel===c?'selected':''} style="background:#222">${c}</option>`).join('')}
          </select></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label style="font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:5px;letter-spacing:0.3px">REVENUE (CA$) *</label>
          <input type="number" placeholder="e.g. 27.99" value="${s.revenue}" oninput="S.newSale.revenue=this.value" style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;color:#fff;font-size:13px;outline:none"></div>
        <div><label style="font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:5px;letter-spacing:0.3px">COST (CA$)</label>
          <input type="number" placeholder="e.g. 9.00" value="${s.cost}" oninput="S.newSale.cost=this.value" style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;color:#fff;font-size:13px;outline:none"></div>
      </div>
      <div><label style="font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:5px;letter-spacing:0.3px">CUSTOMER NAME *</label>
        <input type="text" placeholder="e.g. Priya Sharma" value="${s.customer}" oninput="S.newSale.customer=this.value" style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;color:#fff;font-size:13px;outline:none"></div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:10px;margin-top:4px">
        <button onclick="S.modal=null;render()" style="padding:11px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;font-size:13px">Cancel</button>
        <button onclick="submitSale()" style="padding:11px;background:#CC0000;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;box-shadow:0 0 20px rgba(204,0,0,0.3)">Save Sale ✓</button>
      </div>
    </div>`);
}

function viewCxModal(){
  if(S.modal!=='viewcx'||!S.selectedCx)return'';
  const c=S.customers.find(x=>x.id===S.selectedCx);
  if(!c)return'';
  const t=tier(c.totalSpend);
  const init=c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const cxSales=S.sales.filter(s=>s.customer===c.name);
  return modalWrap(`
    <div style="background:linear-gradient(135deg,#00001a,#141414);padding:1.5rem;border-radius:20px 20px 0 0">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:54px;height:54px;border-radius:14px;background:rgba(204,0,0,0.2);color:#FF6666;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700">${init}</div>
        <div style="flex:1">
          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff">${c.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px">${c.phone} · ${c.email||'no email'}</div>
        </div>
        <span style="background:${t.bg};color:${t.color};border:1px solid ${t.border};font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600">${t.label}</span>
        <button onclick="S.modal=null;render()" style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
      </div>
    </div>
    <div style="padding:1.5rem;display:grid;gap:14px">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${[{label:'Total Spent',val:cad(c.totalSpend),color:'#CC0000'},{label:'Orders',val:c.orders,color:'#fff'},{label:'Last Visit',val:c.lastVisit,color:'#FFB800'}].map(m=>`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px;text-align:center"><div style="font-size:14px;font-weight:700;color:${m.color}">${m.val}</div><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px">${m.label}</div></div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px"><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:4px">Favourite pizza</div><div style="font-size:12px;color:#fff">🍕 ${c.favPizza}</div></div>
        <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px"><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:4px">Preferred channel</div><div style="font-size:12px;color:#fff">${c.channel}</div></div>
      </div>
      ${c.tags.length?`<div><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:6px;letter-spacing:0.5px">TAGS</div><div style="display:flex;flex-wrap:wrap;gap:5px">${c.tags.map(tg=>`<span style="background:rgba(204,0,0,0.15);color:#FF8888;border:1px solid rgba(204,0,0,0.2);font-size:11px;padding:3px 10px;border-radius:20px">${tg}</span>`).join('')}</div></div>`:''}
      ${c.notes?`<div style="background:rgba(255,184,0,0.07);border:1px solid rgba(255,184,0,0.15);border-radius:10px;padding:12px"><div style="font-size:10px;color:#FFB800;margin-bottom:4px;font-weight:500">📝 STAFF NOTES</div><div style="font-size:12px;color:rgba(255,255,255,0.6);line-height:1.6">${c.notes}</div></div>`:''}
      ${cxSales.length?`<div><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:8px;letter-spacing:0.5px">ORDER HISTORY</div>
        ${cxSales.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
          <div style="display:flex;align-items:center;gap:8px"><span>🍕</span><div><div style="font-size:12px;color:#fff">${s.pizza} · ${s.size}</div><div style="font-size:10px;color:rgba(255,255,255,0.3)">${s.date} · ${s.channel}</div></div></div>
          <div style="font-size:13px;font-weight:600;color:#CC0000">${cad(s.revenue)}</div>
        </div>`).join('')}
      </div>`:''}
    </div>`);
}

// ─── RENDER ───
function render(){
  const el=$('root');if(!el)return;
  if(S.screen==='login'){el.innerHTML=loginScreen();return;}
  let body='';
  if(S.tab==='dashboard')body=dashboardTab();
  else if(S.tab==='sales')body=salesTab();
  else if(S.tab==='customers')body=customersTab();
  el.innerHTML=shell(body)+saleModal()+viewCxModal();
}

// ─── ACTIONS ───
window.doLogin=function(role){S.screen='app';S.role=role;S.tab='dashboard';render();}
window.doLogout=function(){S.screen='login';S.role=null;render();}
window.setTab=function(t){S.tab=t;render();}
window.submitSale=function(){
  const s=S.newSale;
  if(!s.pizza||!s.size||!s.revenue||!s.customer){showAlert('Fill in all required fields.','error');return;}
  S.sales.unshift({id:Date.now(),date:s.date,pizza:s.pizza,size:s.size,qty:Number(s.qty),channel:s.channel,revenue:Number(s.revenue),cost:Number(s.cost)||0,customer:s.customer});
  const cx=S.customers.find(c=>c.name===s.customer);
  if(cx){cx.totalSpend+=Number(s.revenue);cx.orders+=1;cx.lastVisit=s.date;}
  S.newSale={pizza:'The Canadian',size:'Large',qty:1,channel:'Walk-in',revenue:'',cost:'',customer:'',date:new Date().toISOString().slice(0,10)};
  S.modal=null;
  showAlert('Sale recorded successfully!');
}

render();
</script>

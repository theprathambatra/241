// ═══════════════════════════════════════
// INVENTORY
// ═══════════════════════════════════════
function inventoryTab(){
  const search=S.invSearch.toLowerCase();
  const catFilter=S.invCategory;
  const list=S.inventory.filter(i=>{
    const matchSearch=!search||i.name.toLowerCase().includes(search)||i.category.toLowerCase().includes(search)||i.supplier.toLowerCase().includes(search);
    const matchCat=catFilter==='All'||i.category===catFilter;
    return matchSearch&&matchCat;
  });
  const lowStock=S.inventory.filter(i=>i.qty<=i.minQty);
  const totalValue=S.inventory.reduce((a,i)=>a+i.qty*i.cost,0);
  return`
  <div style="background:linear-gradient(135deg,#0a0a00,#0d0d0d);border-bottom:1px solid rgba(255,255,255,0.05);padding:1.75rem 2rem;position:relative;overflow:hidden">
    <div style="position:absolute;right:2rem;top:50%;transform:translateY(-50%);opacity:0.05;font-size:100px">📦</div>
    <div style="max-width:900px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem">
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#fff;margin-bottom:4px">Inventory</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4)">Live stock levels · Edit inline · Low stock alerts</div>
        </div>
        <button onclick="S.modal='newinv';S.newInventoryItem={category:'Dough & Base',name:'',unit:'units',qty:0,minQty:0,cost:0,supplier:''};render()" style="padding:11px 18px;background:#FFB800;color:#000;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">+ Add Item</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${[
          {label:'Total Items',val:S.inventory.length,icon:'📦',color:'#fff'},
          {label:'Low Stock Alerts',val:lowStock.length,icon:'⚠️',color:'#FFB800'},
          {label:'Stock Value',val:cad(totalValue),icon:'💰',color:'#4CAF50'},
          {label:'Categories',val:INV_CATS.length-1,icon:'🗂️',color:'#2196F3'},
        ].map(m=>`<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:9px 13px;display:flex;align-items:center;gap:7px">
          <span style="font-size:15px">${m.icon}</span>
          <div><div style="font-size:13px;font-weight:600;color:${m.color}">${m.val}</div><div style="font-size:9px;color:rgba(255,255,255,0.3)">${m.label}</div></div>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div style="max-width:900px;margin:0 auto;padding:1.25rem 2rem">
    <!-- Search + filter -->
    <div style="display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center">
      <div style="position:relative;flex:1;min-width:180px">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px">🔍</span>
        <input type="text" placeholder="Search inventory..." oninput="S.invSearch=this.value;render()" style="width:100%;padding:9px 12px 9px 34px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:9px;color:#fff;font-size:12px">
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${INV_CATS.map(cat=>`<button onclick="S.invCategory='${cat}';render()" style="padding:5px 10px;border-radius:16px;border:1px solid ${S.invCategory===cat?'#FFB800':'rgba(255,255,255,0.1)'};background:${S.invCategory===cat?'rgba(255,184,0,0.15)':'transparent'};color:${S.invCategory===cat?'#FFB800':'rgba(255,255,255,0.4)'};font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap">${cat}</button>`).join('')}
      </div>
    </div>
    <!-- Table -->
    <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden">
      <div style="display:grid;grid-template-columns:140px 1fr 80px 80px 80px 100px 110px 90px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03)">
        ${['Category','Item Name','Qty','Unit','Min Qty','Cost/Unit','Supplier','Actions'].map(h=>`<div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:0.4px">${h.toUpperCase()}</div>`).join('')}
      </div>
      ${list.length===0?`<div style="padding:2rem;text-align:center;color:rgba(255,255,255,0.3);font-size:13px">No items found</div>`:''}
      ${list.map((item,i)=>{
        const isLow=item.qty<=item.minQty;
        const isEditing=S.editingInventoryId===item.id;
        if(isEditing){
          return`<div style="display:grid;grid-template-columns:140px 1fr 80px 80px 80px 100px 110px 90px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,184,0,0.05);align-items:center">
            <div style="font-size:10px;color:#FFB800">${item.category}</div>
            <input value="${item.name}" id="inv_name_${item.id}" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,184,0,0.3);border-radius:5px;color:#fff;font-size:11px;padding:4px 6px;width:95%">
            <input type="number" value="${item.qty}" id="inv_qty_${item.id}" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,184,0,0.3);border-radius:5px;color:#fff;font-size:11px;padding:4px 6px;width:90%">
            <div style="font-size:11px;color:rgba(255,255,255,0.45)">${item.unit}</div>
            <input type="number" value="${item.minQty}" id="inv_min_${item.id}" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,184,0,0.3);border-radius:5px;color:#fff;font-size:11px;padding:4px 6px;width:90%">
            <input type="number" value="${item.cost}" id="inv_cost_${item.id}" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,184,0,0.3);border-radius:5px;color:#fff;font-size:11px;padding:4px 6px;width:95%">
            <input value="${item.supplier}" id="inv_sup_${item.id}" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,184,0,0.3);border-radius:5px;color:#fff;font-size:10px;padding:4px 6px;width:95%">
            <div style="display:flex;gap:4px">
              <button onclick="saveInvEdit(${item.id})" style="padding:4px 8px;background:#4CAF50;color:#fff;border:none;border-radius:5px;font-size:10px;cursor:pointer;font-weight:600">✓</button>
              <button onclick="S.editingInventoryId=null;render()" style="padding:4px 8px;background:rgba(255,255,255,0.08);color:#aaa;border:none;border-radius:5px;font-size:10px;cursor:pointer">✕</button>
            </div>
          </div>`;
        }
        return`<div style="display:grid;grid-template-columns:140px 1fr 80px 80px 80px 100px 110px 90px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;transition:background 0.15s;background:${isLow?'rgba(255,100,0,0.04)':i%2===0?'transparent':'rgba(255,255,255,0.01)'}" onmouseenter="this.style.background='rgba(255,184,0,0.04)'" onmouseleave="this.style.background='${isLow?'rgba(255,100,0,0.04)':i%2===0?'transparent':'rgba(255,255,255,0.01)'}'">
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">${item.category}</div>
          <div style="font-size:12px;font-weight:500;color:#fff">${item.name}</div>
          <div style="font-size:13px;font-weight:700;color:${isLow?'#FF6644':'#fff'}">${item.qty} ${isLow?'⚠️':''}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.4)">${item.unit}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.4)">${item.minQty}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.55)">${cad(item.cost)}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">${item.supplier}</div>
          <div style="display:flex;gap:5px">
            <button onclick="S.editingInventoryId=${item.id};render()" style="padding:4px 9px;background:rgba(255,184,0,0.12);color:#FFB800;border:1px solid rgba(255,184,0,0.2);border-radius:5px;font-size:10px;cursor:pointer">Edit</button>
            <button onclick="deleteInvItem(${item.id})" style="padding:4px 7px;background:rgba(204,0,0,0.1);color:#FF6666;border:1px solid rgba(204,0,0,0.15);border-radius:5px;font-size:10px;cursor:pointer">✕</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function modalWrap(content,maxW=480){
  return`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(8px)" onclick="if(event.target===this){S.modal=null;S.editingInventoryId=null;render()}">
    <div style="background:#141414;border:1px solid rgba(255,255,255,0.1);border-radius:18px;width:100%;max-width:${maxW}px;max-height:92vh;overflow-y:auto;animation:fadeUp 0.3s ease" onclick="event.stopPropagation()">${content}</div>
  </div>`;
}

function modalHeader(title,sub,gradient='#1a0000'){
  return`<div style="background:linear-gradient(135deg,${gradient},#141414);padding:1.25rem 1.5rem;border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:space-between">
    <div><div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff">${title}</div>${sub?`<div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px">${sub}</div>`:''}</div>
    <button onclick="S.modal=null;render()" style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
  </div>`;
}

function fieldStyle(){return`width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;color:#fff;font-size:12px`;}
function labelStyle(){return`font-size:10px;color:rgba(255,255,255,0.35);display:block;margin-bottom:5px;letter-spacing:0.3px`;}

function saleModal(){

        <div><label style="${labelStyle()}">DATE</label><input type="date" value="${s.date}" onchange="S.newSale.date=this.value" style="${fieldStyle()}"></div>

      <div><label style="${labelStyle()}">PIZZA *</label>
        <select onchange="S.newSale.pizza=this.value" style="${fieldStyle()}">${PIZZAS.map(p=>`<option value="${p}" ${s.pizza===p?'selected':''} style="background:#222">${p}</option>`).join('')}</select></div>

        <div><label style="${labelStyle()}">SIZE *</label>

        <div><label style="${labelStyle()}">CHANNEL *</label>
          <select onchange="S.newSale.channel=this.value" style="${fieldStyle()}">${['Walk-in','Phone','Uber Eats','DoorDash'].map(c=>`<option value="${c}" ${s.channel===c?'selected':''} style="background:#222">${c}</option>`).join('')}</select></div>

        <textarea placeholder="Preferences, allergies, important info..." oninput="S.newCustomer.notes=this.value" style="${fieldStyle()};height:70px;resize:none">${nc.notes}</textarea></div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-top:4px">
        <button onclick="S.modal=null;render()" style="padding:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.09);border-radius:8px;cursor:pointer;font-size:12px">Cancel</button>
        <button onclick="submitNewCustomer()" style="padding:10px;background:linear-gradient(135deg,#2D6A1F,#1a4a10);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;box-shadow:0 0 16px rgba(45,106,31,0.3)">Add Customer ✓</button>
      </div>
    </div>`);
}

function viewCxModal(){
  if(S.modal!=='viewcx'||!S.selectedCx)return'';
  const c=S.customers.find(x=>x.id===S.selectedCx);if(!c)return'';
  const t=tier(c.totalSpend);
  const init=c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const cxSales=S.sales.filter(s=>s.customer===c.name);
  return modalWrap(`
    <div style="background:linear-gradient(135deg,#00001a,#141414);padding:1.25rem 1.5rem;border-radius:18px 18px 0 0">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:50px;height:50px;border-radius:12px;background:rgba(204,0,0,0.2);color:#FF6666;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0">${init}</div>
        <div style="flex:1">
          <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff">${c.name}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px">${c.phone} · ${c.email||'no email'}</div>
        </div>
        <span style="background:${t.bg};color:${t.color};border:1px solid ${t.border};font-size:10px;padding:3px 10px;border-radius:18px;font-weight:600">${t.label}</span>
        <button onclick="S.modal=null;render()" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.4);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
      </div>
    </div>
    <div style="padding:1.25rem;display:grid;gap:12px">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${[{label:'Total Spent',val:cad(c.totalSpend),color:'#CC0000'},{label:'Orders',val:c.orders,color:'#fff'},{label:'Last Visit',val:c.lastVisit,color:'#FFB800'}].map(m=>`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:9px;text-align:center"><div style="font-size:13px;font-weight:700;color:${m.color}">${m.val}</div><div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:1px">${m.label}</div></div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:rgba(255,255,255,0.03);border-radius:8px;padding:9px"><div style="font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:3px">Favourite pizza</div><div style="font-size:11px;color:#fff">🍕 ${c.favPizza}</div></div>
        <div style="background:rgba(255,255,255,0.03);border-radius:8px;padding:9px"><div style="font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:3px">Preferred channel</div><div style="font-size:11px;color:#fff">${c.channel}</div></div>
      </div>
      ${c.tags.length?`<div><div style="font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:5px;letter-spacing:0.4px">TAGS</div><div style="display:flex;flex-wrap:wrap;gap:4px">${c.tags.map(tg=>`<span style="background:rgba(204,0,0,0.13);color:#FF8888;border:1px solid rgba(204,0,0,0.18);font-size:10px;padding:2px 9px;border-radius:18px">${tg}</span>`).join('')}</div></div>`:''}
      ${c.notes?`<div style="background:rgba(255,184,0,0.06);border:1px solid rgba(255,184,0,0.12);border-radius:9px;padding:10px"><div style="font-size:9px;color:#FFB800;margin-bottom:3px;font-weight:600">📝 STAFF NOTES</div><div style="font-size:11px;color:rgba(255,255,255,0.55);line-height:1.6">${c.notes}</div></div>`:''}
      ${cxSales.length?`<div><div style="font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:6px;letter-spacing:0.4px">ORDER HISTORY</div>${cxSales.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <div style="display:flex;align-items:center;gap:7px"><span>🍕</span><div><div style="font-size:11px;color:#fff">${s.pizza} · ${s.size}</div><div style="font-size:9px;color:rgba(255,255,255,0.3)">${s.date} · ${s.channel}</div></div></div>
        <div style="font-size:12px;font-weight:600;color:#CC0000">${cad(s.revenue)}</div>
      </div>`).join('')}</div>`:''}
    </div>`);
}

function newInvModal(){
  if(S.modal!=='newinv')return'';
  const ni=S.newInventoryItem;
  return modalWrap(`
    ${modalHeader('Add Inventory Item','Add a new stock item','#0a0a00')}
    <div style="padding:1.25rem;display:grid;gap:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="${labelStyle()}">CATEGORY *</label>
          <select onchange="S.newInventoryItem.category=this.value" style="${fieldStyle()}">${INV_CATS.filter(c=>c!=='All').map(c=>`<option value="${c}" ${ni.category===c?'selected':''} style="background:#222">${c}</option>`).join('')}</select></div>
        <div><label style="${labelStyle()}">ITEM NAME *</label><input type="text" placeholder="e.g. Mozzarella" oninput="S.newInventoryItem.name=this.value" value="${ni.name}" style="${fieldStyle()}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div><label style="${labelStyle()}">CURRENT QTY *</label><input type="number" min="0" value="${ni.qty}" oninput="S.newInventoryItem.qty=Number(this.value)" style="${fieldStyle()}"></div>
        <div><label style="${labelStyle()}">UNIT</label>
          <select onchange="S.newInventoryItem.unit=this.value" style="${fieldStyle()}">${['units','kg','litres','bottles','boxes'].map(u=>`<option value="${u}" ${ni.unit===u?'selected':''} style="background:#222">${u}</option>`).join('')}</select></div>
        <div><label style="${labelStyle()}">MIN QTY (alert)</label><input type="number" min="0" value="${ni.minQty}" oninput="S.newInventoryItem.minQty=Number(this.value)" style="${fieldStyle()}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="${labelStyle()}">COST PER UNIT (CA$)</label><input type="number" min="0" step="0.01" value="${ni.cost}" oninput="S.newInventoryItem.cost=Number(this.value)" style="${fieldStyle()}"></div>
        <div><label style="${labelStyle()}">SUPPLIER</label><input type="text" placeholder="e.g. Sysco" oninput="S.newInventoryItem.supplier=this.value" value="${ni.supplier}" style="${fieldStyle()}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-top:4px">
        <button onclick="S.modal=null;render()" style="padding:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.09);border-radius:8px;cursor:pointer;font-size:12px">Cancel</button>
        <button onclick="submitNewInvItem()" style="padding:10px;background:linear-gradient(135deg,#FFB800,#cc9200);color:#000;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700">Add to Inventory ✓</button>
      </div>
    </div>`);
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  const el=$('root');if(!el)return;
  if(S.screen==='login'){el.innerHTML=loginScreen();return;}
  let body='';
  if(S.tab==='dashboard')body=dashboardTab();
  else if(S.tab==='sales')body=salesTab();
  else if(S.tab==='customers')body=customersTab();
  else if(S.tab==='inventory')body=inventoryTab();
  else if(S.tab==='settings')body=settingsTab();
  el.innerHTML=shell(body)+saleModal()+newCxModal()+viewCxModal()+newInvModal();
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
window.doLogin=function(){
  const role=S.loginForm.role;
  const user=($('loginUser')||{value:S.loginForm.user}).value.trim();
  const pass=($('loginPass')||{value:S.loginForm.pass}).value.trim();
  S.loginForm.user=user;S.loginForm.pass=pass;
  if(!role){S.loginForm.error='Please select Owner or Staff';render();return;}
  if(!user||!pass){S.loginForm.error='Please enter username and password';render();return;}
  const cred=S.credentials[role];
  if(user===cred.user&&pass===cred.pass){
    S.screen='app';S.role=role;S.tab='dashboard';S.loginForm={user:'',pass:'',error:''};render();
  } else {
    S.loginForm.error='Incorrect username or password';render();
  }
}
window.doLogout=function(){S.screen='login';S.role=null;S.loginForm={user:'',pass:'',error:''};render();}
window.setTab=function(t){S.tab=t;S.editingInventoryId=null;render();}

window.submitSale=function(){
  const s=S.newSale;
  if(!s.pizza||!s.size||!s.revenue||!s.customer){showAlert('Fill in all required fields.','error');return;}
  S.sales.unshift({id:Date.now(),date:s.date,pizza:s.pizza,size:s.size,qty:Number(s.qty),channel:s.channel,revenue:Number(s.revenue),cost:Number(s.cost)||0,customer:s.customer});
  const cx=S.customers.find(c=>c.name===s.customer);
  if(cx){cx.totalSpend+=Number(s.revenue);cx.orders+=1;cx.lastVisit=s.date;}
  S.newSale={pizza:'The Canadian',size:'Large',qty:1,channel:'Walk-in',revenue:'',cost:'',customer:'',date:new Date().toISOString().slice(0,10)};
  S.modal=null;showAlert('Sale recorded! 🍕');
}

window.submitNewCustomer=function(){
  const nc=S.newCustomer;
  if(!nc.name||!nc.phone){showAlert('Name and phone are required.','error');return;}
  if(S.customers.find(c=>c.name.toLowerCase()===nc.name.toLowerCase())){showAlert('Customer already exists.','error');return;}
  S.customers.push({id:Date.now(),name:nc.name,phone:nc.phone,email:nc.email,lastVisit:new Date().toISOString().slice(0,10),totalSpend:0,orders:0,favPizza:nc.favPizza,channel:nc.channel,tags:[...nc.tags],notes:nc.notes});
  S.newCustomer={name:'',phone:'',email:'',favPizza:'The Canadian',channel:'Walk-in',tags:[],notes:''};
  S.modal=null;showAlert(`${nc.name} added! 👥`);
}

window.toggleCxTag=function(tag){
  const tags=S.newCustomer.tags;
  const i=tags.indexOf(tag);
  if(i>=0)tags.splice(i,1);else tags.push(tag);
  render();
}

window.submitNewInvItem=function(){
  const ni=S.newInventoryItem;
  if(!ni.name||!ni.category){showAlert('Name and category are required.','error');return;}
  S.inventory.push({id:Date.now(),category:ni.category,name:ni.name,unit:ni.unit,qty:Number(ni.qty),minQty:Number(ni.minQty),cost:Number(ni.cost),supplier:ni.supplier});
  S.modal=null;showAlert(`${ni.name} added to inventory! 📦`);
}

window.saveInvEdit=function(id){
  const item=S.inventory.find(i=>i.id===id);if(!item)return;
  const n=$('inv_name_'+id);const q=$('inv_qty_'+id);const m=$('inv_min_'+id);const c=$('inv_cost_'+id);const s=$('inv_sup_'+id);
  if(n)item.name=n.value;
  if(q)item.qty=Number(q.value);
  if(m)item.minQty=Number(m.value);
  if(c)item.cost=Number(c.value);
  if(s)item.supplier=s.value;
  S.editingInventoryId=null;
  showAlert(`${item.name} updated! ✓`);
}

window.deleteInvItem=function(id){
  const item=S.inventory.find(i=>i.id===id);
  if(!item)return;
  if(confirm(`Delete "${item.name}" from inventory?`)){
    S.inventory=S.inventory.filter(i=>i.id!==id);
    showAlert(`${item.name} removed.`);
  }
}

window.saveCredentials=function(role){
  const u=$(role+'User');const p=$(role+'Pass');
  if(!u||!p||!u.value.trim()||!p.value.trim()){showAlert('Username and password cannot be empty.','error');return;}
  S.credentials[role]={user:u.value.trim(),pass:p.value.trim()};
  showAlert(`${role==='owner'?'Owner':'Staff'} credentials updated! ✓`);
}

render();
</script>
